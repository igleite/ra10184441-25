services:
  traefik:
    image: traefik:v3.3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Mudar@123}
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - web

  migrator:
    build:
      context: ./Api
      target: migrator
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Mudar@123}
    depends_on:
      sqlserver:
        condition: service_healthy
    command:
      [
        "--yes",
        "sqlserver",
        "MeuBanco",
        "sa",
        "${MSSQL_SA_PASSWORD:-Mudar@123}",
      ]
    restart: "no"
    networks:
      - web

  api:
    build:
      context: ./Api
      target: api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SdpNewConnection: Server=sqlserver;Database=MeuBanco;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Mudar@123};Encrypt=False;TrustServerCertificate=True;
      Auth__AppUrl: http://localtest.me
      Jwt__Secret: ChaveSecretaMinimo32CaracteresParaHS256!
      Email__SmtpHost: mailhog
      Email__SmtpPort: "1025"
      Email__UseSsl: "false"
      Email__UserName: ""
      Email__Password: ""
      Email__FromEmail: noreply@localtest.me
      Email__FromName: Service Desk
    depends_on:
      migrator:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.localtest.me`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8080
    networks:
      - web

  webnext:
    build:
      context: ./WebNext
      args:
        NEXT_PUBLIC_API_URL: http://api.localtest.me
        NEXT_PUBLIC_ROOT_DOMAIN: localtest.me
    environment:
      NEXT_PUBLIC_API_URL: http://api.localtest.me
      NEXT_PUBLIC_ROOT_DOMAIN: localtest.me
    extra_hosts:
      - "api.localtest.me:host-gateway"
      - "localtest.me:host-gateway"
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web-root.rule=Host(`localtest.me`)
      - traefik.http.routers.web-root.entrypoints=web
      - traefik.http.routers.web-root.service=web
      - traefik.http.routers.web-root.priority=2
      - traefik.http.routers.web-tenant.rule=HostRegexp(`[a-z0-9-]+\.localtest\.me`)
      - traefik.http.routers.web-tenant.entrypoints=web
      - traefik.http.routers.web-tenant.service=web
      - traefik.http.routers.web-tenant.priority=1
      - traefik.http.services.web.loadbalancer.server.port=3000
    networks:
      - web

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  sqlserver_data:
